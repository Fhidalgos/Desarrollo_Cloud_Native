name: CI/CD Plataforma Cursos

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar proyecto con Maven
        run: mvn clean package -DskipTests

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-cursos:latest .

      - name: Subir imagen a Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-cursos:latest

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USER_SERVER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker stop plataforma-cursos || true
            sudo docker rm plataforma-cursos || true
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-cursos:latest
            sudo docker run -d -p 8080:8080 --name plataforma-cursos ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-cursos:latest
            sudo docker ps